<!DOCTYPE html>
<html lang="zh-CN">

<title>卡通女孩</title>
<style>

    justify-content: center;
    min-height: 100vh;

  }
  .card {
    background: white;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(200,120,160,0.15);
    padding: 30px 40px;
    display: flex;

    align-items: center;

</style>
</head>

    <text x="35" y="300" font-size="10" fill="#d4b3ff" opacity="0.6">✦</text>
    <text x="215" y="310" font-size="14" fill="#ffd4b3" opacity="0.6">✦</text>
  </svg>
  <p style="color:#b080a0;font-size:0.85rem;margin-top:8px;">卡通少女 · 牛仔裤 · 粉色上衣</p>
</div>
</body>
</html>
